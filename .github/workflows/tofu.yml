name: OpenTofu

on:
  push:
    branches: [main]
    paths:
      - infra/**
      - .github/workflows/tofu.yml
  pull_request:
    paths:
      - infra/**
      - .github/workflows/tofu.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for WIF

jobs:
  tofu:
    name: Plan / Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: "1.9"

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: tofu init
        run: tofu init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: tofu validate
        run: tofu validate

      - name: tofu plan
        run: |
          tofu plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="github_repo=${{ vars.TARGET_GITHUB_REPO }}" \
            -var="infra_github_repo=ketangit/tf-gcp-config" \
            -var="state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -out=tfplan

      - name: tofu apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: tofu apply tfplan
